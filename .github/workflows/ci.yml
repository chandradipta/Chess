name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+asyncpg://chess:chesspass@localhost:5432/chess
      PYTHONPATH: .

    services:
      postgres:
        image: postgres:15

        env:
          POSTGRES_DB: chess
          POSTGRES_USER: chess
          POSTGRES_PASSWORD: chesspass

        ports:
          - 5432:5432

        options: >-
          --health-cmd "pg_isready -U chess"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7

        ports:
          - 6379:6379

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Wait for PostgreSQL
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5432 -U chess && break
            sleep 2
          done

      - name: Create Database Tables
        run: |
          python - <<'PY'
          import asyncio
          from backend.app.db import engine
          from backend.app.models import Base

          async def setup():
              async with engine.begin() as conn:
                  await conn.run_sync(Base.metadata.create_all)

          asyncio.run(setup())
          PY

      - name: Run Tests
        working-directory: backend
        run: |
          pytest -q