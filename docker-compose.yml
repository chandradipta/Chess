version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: chess
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chesspass
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/app:/app
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379

  engine_worker:
    build: ./backend
    command: ["python", "engine_worker.py"]
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    volumes:
      - ./backend/app:/app

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  db_data: