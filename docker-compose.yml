version: "3.8"

services:
  db:
    image: postgres:15
    restart: unless-stopped

    environment:
      POSTGRES_DB: chess
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chesspass

    ports:
      - "5432:5432"

    volumes:
      - db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend

    env_file:
      - ./backend/.env

    environment:
      DATABASE_URL: postgresql+asyncpg://chess:chesspass@db:5432/chess
      REDIS_URL: redis://redis:6379

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    restart: unless-stopped

  engine_worker:
    build:
      context: ./backend

    command: ["python", "engine_worker.py"]

    env_file:
      - ./backend/.env

    environment:
      DATABASE_URL: postgresql+asyncpg://chess:chesspass@db:5432/chess
      REDIS_URL: redis://redis:6379

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - ./backend:/app

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    ports:
      - "3000:3000"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      VITE_API_URL: http://localhost:8000

    depends_on:
      - backend

    restart: unless-stopped

volumes:
  db_data: